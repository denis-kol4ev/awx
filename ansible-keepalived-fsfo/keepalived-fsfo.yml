---
- name: Force Install Dependencies inside AWX Runner Container
  hosts: localhost
  gather_facts: false
  connection: local
  tasks:
    - name: Inject netaddr library into the active Ansible Python virtualenv
      ansible.builtin.pip:
        name: netaddr
        state: present
      vars:
        ansible_python_interpreter: "{{ ansible_playbook_python }}"

- name: Keepalived + FSFO
  hosts: "{{ all_host_list | select() | flatten | unique }}"
  vars:
    all_host_list:
      - "{{ host_list | default() | lower }}"
      - "{{ primary_host_list | default() | lower }}"
      - "{{ standby_host_list | default() | lower }}"
  gather_facts: true
  roles:
    
     - role: host-alias-down
       become: true
       become_user: root
       tags: alias

     - role: keepalived
       become: true
       become_user: root
       tags: keepalived

     - role: fsfo
       become: true
       become_user: oracle