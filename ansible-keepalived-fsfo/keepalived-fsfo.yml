---
- name: Keepalived + FSFO
  hosts: "{{ all_host_list | select() | flatten | unique }}"
  vars:
    all_host_list:
      - "{{ host_list | default() | lower }}"
      - "{{ primary_host_list | default() | lower }}"
      - "{{ standby_host_list | default() | lower }}"
      #- pc-lab-ora01
      #- pc-lab-ora02
      #- pc-lab-ora03
      #- angel19
      #- devil19
  gather_facts: true
  roles:
    
     - role: keepalived
       become: true
       become_user: root
       tags: keepalived

     - role: fsfo
       become: true
       become_user: oracle